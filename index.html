<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuamaPrint · Portal de Serviços</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GuamaPrint">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <style>
        :root {
            --laranja: #f97316;
            --laranja-escuro: #ea580c;
            --laranja-claro: #fb923c;
            --bg: #0f0f0f;
            --card: #1c1c1c;
            --border: #2e2e2e;
            --texto: #e5e5e5;
            --texto-secundario: #a3a3a3;
            --sombra: 0 8px 30px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .logo {
            width: 140px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 12px rgba(249,115,22,0.5));
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--laranja), var(--laranja-claro));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .slogan {
            color: var(--texto-secundario);
            margin-top: 0.3rem;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        /* Cards de serviço */
        .services {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.25s;
            box-shadow: var(--sombra);
        }
        .card:hover {
            border-color: var(--laranja);
            box-shadow: 0 0 20px rgba(249,115,22,0.25);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .card-icon {
            font-size: 2.2rem;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
        }
        .card-desc {
            font-size: 0.9rem;
            color: var(--texto-secundario);
        }

        /* Botões */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            width: 100%;
            background: var(--laranja);
            color: white;
            box-shadow: 0 4px 12px rgba(249,115,22,0.4);
        }
        .btn:hover {
            background: var(--laranja-escuro);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(249,115,22,0.6);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--laranja);
            color: var(--laranja);
            box-shadow: none;
        }
        .btn-outline:hover {
            background: rgba(249,115,22,0.1);
            color: var(--laranja-claro);
        }
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            width: auto;
        }

        /* Campo IP personalizado */
        .custom-ip {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            background: #111;
            border-radius: 30px;
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
        }
        .ip-prefix {
            color: var(--texto-secundario);
            font-family: monospace;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .ip-input {
            width: 3.5rem;
            text-align: center;
            background: #262626;
            border: 1px solid var(--border);
            color: white;
            border-radius: 20px;
            padding: 0.5rem;
            font-size: 0.95rem;
            font-family: monospace;
            outline: none;
            transition: border 0.2s;
        }
        .ip-input:focus {
            border-color: var(--laranja);
        }
        .ip-suffix {
            color: var(--texto-secundario);
            font-family: monospace;
            font-size: 0.95rem;
        }
        .custom-ip .btn {
            flex: 0 0 auto;
            width: auto;
            padding: 0.5rem 1.2rem;
            margin: 0.2rem;
        }

        /* Divisor */
        .divider {
            border-top: 1px solid var(--border);
            margin: 1.2rem 0 0.8rem;
        }

        /* Rodapé */
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--texto-secundario);
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Aviso rede */
        .network-note {
            background: #1c1c1c;
            border-left: 3px solid var(--laranja);
            padding: 0.8rem 1rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--texto-secundario);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabeçalho com logo -->
        <div class="header">
            <!-- Fallback caso a imagem não carregue -->
            <div style="display: none; font-size: 3rem; margin-bottom: 0.5rem;">🖨️</div>
            <h1>Guamaprint</h1>
            <p class="slogan">Portal de Serviços Internos</p>
        </div>

        <!-- Rede interna obrigatória -->
        <div class="network-note">
            ⚡ <strong>Conecte-se à rede Wi‑Fi da empresa</strong> para acessar os serviços.
        </div>

        <!-- Cards de serviços -->
        <div class="services">

            <!-- Ponto Eletrónico -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🕒</span>
                    <div>
                        <div class="card-title">Ponto Eletrônico</div>
                        <div class="card-desc">Registe sua entrada e saída</div>
                    </div>
                </div>
                <a href="http://192.168.1.21:8080" target="_blank" class="btn">
                    Acessar Ponto (IP principal)
                </a>
                <div class="custom-ip">
                    <span class="ip-prefix">192.168.1.</span>
                    <input type="text" class="ip-input" id="customOctet" placeholder="21" maxlength="2" inputmode="numeric" pattern="[0-9]*" value="21">
                    <span class="ip-suffix">:8080</span>
                    <button class="btn btn-outline btn-small" id="goCustomIP">Ir</button>
                </div>
            </div>

            <!-- GuamaPrint (exemplo) 
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🖨️</span>
                    <div>
                        <div class="card-title">GuamaPrint</div>
                        <div class="card-desc">Sistema de impressão e digitalização</div>
                    </div>
                </div>
                <a href="http://192.168.1.21:8081" target="_blank" class="btn">
                    Acessar GuamaPrint
                </a>
            </div> -->
            <!-- Chamado de Suporte -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🔧</span>
                    <div>
                        <div class="card-title">Chamado de Suporte</div>
                        <div class="card-desc">Abrir um ticket de ajuda</div>
                    </div>
                </div>
                <a href="https://forms.office.com/r/SEU-LINK-AQUI" target="_blank" class="btn">
                    Abrir Chamado
                </a>
            </div>

        </div>

        <div class="footer">
            GuamaPrint © <span id="year"></span> · v1.0
        </div>
    </div>

    <script>
        (function() {
            // Atualiza o ano automaticamente
            document.getElementById('year').textContent = new Date().getFullYear();

            // IP personalizado
            const octetInput = document.getElementById('customOctet');
            const goBtn = document.getElementById('goCustomIP');

            function goToCustomIP() {
                let octet = octetInput.value.trim();
                // Remove zeros à esquerda? Aceita "05" como 5. Vamos manter como string, apenas garantir que são dígitos.
                if (/^\d{1,2}$/.test(octet)) {
                    // Converte para número para remover zero à esquerda e limitar entre 0 e 255
                    let num = parseInt(octet, 10);
                    if (num >= 0 && num <= 255) {
                        const url = `http://192.168.1.${num}:8080`;
                        window.open(url, '_blank');
                    } else {
                        alert('Insira um número entre 0 e 255.');
                    }
                } else {
                    alert('Digite apenas números (ex.: 21, 05, 100).');
                }
            }

            goBtn.addEventListener('click', goToCustomIP);
            octetInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    goToCustomIP();
                }
            });

            // Restringe o input a apenas números
            octetInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0,2);
            });

            // Registro do Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js');
                });
            }
        })();
    </script>
</body>
</html>
